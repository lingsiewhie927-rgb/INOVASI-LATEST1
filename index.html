        * { box-sizing: border-box; user-select: none; }
        body { font-family: 'Inter', sans-serif; background-color: #e0f2fe; height: 100vh; width: 100vw; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        .admin-bar { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 2px solid #bae6fd; z-index: 100; flex-shrink: 0; }
        .choice-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .choice-btn:active { transform: scale(0.97); }
        .battlefield { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; overflow: visible; }
        .rope-container { transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; overflow: visible; gap: 0; }
        .rope { height: 22px; background: #795548; background-image: linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 75%, transparent 75%, transparent); background-size: 24px 24px; border-radius: 40px; box-shadow: 0 6px 12px rgba(0,0,0,0.25); border: 3px solid #3e2723; width: 380px; flex-shrink: 0; position: relative; }
        .fixed-center-dash { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 6px; height: 300px; background: repeating-linear-gradient(to bottom, #64748b 0px, #64748b 12px, transparent 12px, transparent 24px); z-index: 15; pointer-events: none; opacity: 0.7; }
        .rope-marker { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 20; pointer-events: none; }
        .rope-marker > div { width: 12px; height: 110px; background: linear-gradient(to bottom, #fde047, #f59e0b); border: 4px solid white; border-radius: 20px; }
        @keyframes pull-feedback { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.05) rotate(-2deg); } 100% { transform: scale(1) rotate(0deg); } }
        .pull-anim { animation: pull-feedback 0.3s ease-out; }
        .character { transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1); filter: drop-shadow(0 12px 18px rgba(0,0,0,0.2)); flex-shrink: 0; width: 140px; display: flex; justify-content: center; align-items: center; }
        .character svg { width: 130px; height: auto; pointer-events: none; }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(var(--base-rot)); } 50% { transform: translateY(-8px) rotate(var(--base-rot)); } }
        .idle-float { animation: float 4s infinite ease-in-out; }
        .table-wrapper { max-height: 400px; overflow-y: auto; border-radius: 20px; border: 2px solid #e2e8f0; }
        .edit-table th { background: #f8fafc; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #334155; }
        .batch-panel { background: #fefce8; border-radius: 1.5rem; padding: 1rem; margin-bottom: 1rem; border: 2px solid #fde047; }
        .password-eye { cursor: pointer; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); user-select: none; }
        .lock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; backdrop-filter: blur(12px); }
        .disabled-btn { opacity: 0.6; pointer-events: none; filter: grayscale(0.1); }
        .random-order-hint { font-size: 0.7rem; color: #94a3b8; margin-top: 4px; text-align: center; }
    </style>

    (function(){
        "use strict";
        function normalizeText(s){ if(!s) return ''; let str=String(s); str=str.replace(/[\u200B-\u200D\uFEFF]/g,''); str=str.replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)); str=str.replace(/\u3000/g,' '); str=str.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,''); str=str.replace(/\s+/g,' '); return str.trim(); }

            judyCard.appendChild(judyTitle); judyCard.appendChild(judyClone);
            const nickCard=document.createElement('div'); nickCard.style.flex='1'; nickCard.style.minWidth='280px'; nickCard.style.backgroundColor='#fff7ed'; nickCard.style.borderRadius='24px'; nickCard.style.padding='1rem'; nickCard.style.boxShadow='0 4px 12px rgba(0,0,0,0.1)';
            const nickTitle=document.createElement('h4'); nickTitle.style.fontWeight='900'; nickTitle.style.color='#c2410c'; nickTitle.style.fontSize='1.25rem'; nickTitle.style.marginBottom='0.75rem'; nickTitle.innerHTML='🦊 尼克的答题卡';
            nickCard.appendChild(nickTitle); nickCard.appendChild(nickClone);
            flexRow.appendChild(judyCard); flexRow.appendChild(nickCard);
            document.body.appendChild(container);
            try{ await html2pdf().set({margin:[0.5,0.5,0.5,0.5], filename:`拔河战报_${Date.now()}.pdf`, image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2,backgroundColor:'#ffffff'}, jsPDF:{unit:'in',format:'a4'}}).from(container).save(); domGame.playAgainBtn.disabled=false; domGame.playAgainBtn.classList.remove('opacity-50','cursor-not-allowed'); alert("PDF已保存，可再次游戏"); } catch(e){ alert("生成失败: "+e); } finally{ document.body.removeChild(container); }
        }
        function applyAndStart(){
            if(globalLocked) return;
            if(gameState.active) resetGame(true);
            clearAllTimeouts(); if(gameState.timerInterval) clearInterval(gameState.timerInterval);
            let currentMax=parseInt(timeInput.value); if(isNaN(currentMax)) currentMax=getStoredDuration(); currentMax=Math.min(600,Math.max(10,currentMax));
            gameState.maxTime=currentMax; gameState.timeLeft=currentMax;
            gameState.pool=collectTableData();
            if(gameState.pool.length===0){ alert("题库为空，请先添加题目"); return; }
            for(let q of gameState.pool) if(!q.options.includes(q.correct)) q.correct=q.options[0];
            gameState.team1Remaining=gameState.pool.map(q=>({...q, options:[...q.options]}));
            gameState.team2Remaining=gameState.pool.map(q=>({...q, options:[...q.options]}));
            gameState.score1=0; gameState.score2=0; gameState.ropePos=0; gameState.gameLog={team1:[],team2:[]};
            gameState.active=true;
            domGame.gameOver.classList.add('hidden'); updateScoresAndRope(); updateTimerDisplay();
            disableAdminButtons(true);
            renderQuestion(1); renderQuestion(2);
            gameState.timerInterval=setInterval(()=>{ if(!gameState.active) return; gameState.timeLeft--; updateTimerDisplay(); if(gameState.timeLeft<=0){ clearInterval(gameState.timerInterval); endGame(); } },1000);
        }
        function resetGame(){ if(globalLocked) return; gameState.active=false; clearInterval(gameState.timerInterval); clearAllTimeouts(); disableAdminButtons(false); domGame.gameOver.classList.add('hidden'); domGame.score1.textContent='0'; domGame.score2.textContent='0'; domGame.q1.textContent="🐾 准备好了吗？"; domGame.q2.textContent="🦊 来吧！"; domGame.o1.innerHTML=''; domGame.o2.innerHTML=''; domGame.rope.style.transform='translateX(0)'; gameState.score1=0; gameState.score2=0; gameState.ropePos=0; gameState.timeLeft=gameState.maxTime; gameState.gameLog={team1:[],team2:[]}; updateTimerDisplay(); if(gameState.pool.length){ gameState.team1Remaining=gameState.pool.map(q=>({...q, options:[...q.options]})); gameState.team2Remaining=gameState.pool.map(q=>({...q, options:[...q.options]})); } }
        document.getElementById('startBtn').onclick=applyAndStart;
        document.getElementById('resetBtn').onclick=resetGame;
        domGame.playAgainBtn.onclick=()=>{ if(!domGame.playAgainBtn.disabled) resetGame(); else alert("请先下载战报PDF"); };
        document.getElementById('generateHtmlBtn').onclick=()=>{ alert("此功能已在独立版中可用，如需生成新的HTML请返回原始游戏页面。"); };
        function initGame(){ loadSavedTime(); resetDefaultTable(false); gameState.pool=collectTableData(); gameState.team1Remaining=[...gameState.pool]; gameState.team2Remaining=[...gameState.pool]; domGame.gameOver.classList.add('hidden'); updateTimerDisplay(); }
        initGame();
    })();
    </script>
</body>
